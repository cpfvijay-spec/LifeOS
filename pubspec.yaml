name: lifeos
description: A complete production-ready Flutter application for tracking life metrics with premium UI/UX.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0
  
  # Routing
  go_router: ^13.0.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  http: ^1.1.0
  dio: ^5.3.0
  dartz: ^0.10.1
  get_it: ^7.6.0
  
  # Google Sign In
  google_sign_in: ^6.1.5
  sign_in_with_apple: ^5.0.0
  
  # PDF Export
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # CSV Export
  csv: ^5.1.1
  
  # Device Info
  device_info_plus: ^9.1.1
  
  # Connectivity
  connectivity_plus: ^5.0.1
  
  # Notifications
  flutter_local_notifications: ^16.1.0
  timezone: ^0.9.2
  
  # Weather API
  geolocator: ^9.0.2
  weather: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  riverpod_cli: ^2.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
